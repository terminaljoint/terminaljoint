<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Brand</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* SCROLL PROGRESS BAR */

.progress{

position:fixed;
top:0;
left:0;

height:4px;
width:0%;

background:#00e5ff;

z-index:2000;

}

/* NAVBAR */

header{

position:fixed;
top:0;

width:100%;

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 25px;

background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);

z-index:1000;

}

.logo-area{

display:flex;
align-items:center;
gap:10px;

}

.logo-area img{

width:38px;

}

nav a{

margin-left:18px;
color:#aaa;
text-decoration:none;

}

nav a:hover{

color:#00e5ff;

}

/* HERO */

.hero{

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:20px;

}

.brand-logo{

width:230px;
height:230px;

border-radius:50%;

background:#111;

display:flex;
justify-content:center;
align-items:center;

box-shadow:0 0 60px #00e5ff33;

transition:0.4s;

}

.brand-logo img{

width:70%;

}

.hero h1{

font-size:42px;

margin-top:20px;

background:linear-gradient(90deg,#00e5ff,#00ff9c);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.hero p{

margin-top:10px;
max-width:500px;
color:#aaa;

}

/* SECTIONS */

section{

padding:100px 10%;

opacity:0;
transform:translateY(40px);

transition:0.8s;

}

section.show{

opacity:1;
transform:translateY(0);

}

.title{

font-size:30px;
margin-bottom:40px;

}

/* PROJECT GRID */

.projects{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

gap:22px;

}

.card{

background:#151515;

padding:25px;

border-radius:10px;

transition:0.3s;

}

.card:hover{

transform:translateY(-8px);
box-shadow:0 0 20px #00e5ff44;

}

/* FOOTER */

footer{

padding:35px;
text-align:center;

background:#050505;

color:#777;

}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:30px;
}

.brand-logo{
width:180px;
height:180px;
}

nav{
display:none;
}

}

</style>

</head>

<body>

<div class="progress" id="progress"></div>

<header>

<div class="logo-area">

<img src="logo.png">

<b>Your Brand</b>

</div>

<nav>

<a href="#vision">Vision</a>
<a href="#projects">Projects</a>
<a href="#roadmap">Roadmap</a>

</nav>

</header>

<div class="hero">

<div class="brand-logo" id="logo">

<img src="logo.png">

</div>

<h1>Your Brand</h1>

<p>

Short brand description.

</p>

</div>

<section id="vision">

<h2 class="title">Vision</h2>

<p>

Your mission and philosophy.

</p>

</section>

<section id="projects">

<h2 class="title">Projects</h2>

<div class="projects">

<div class="card">
<h3>Project</h3>
<p>Description</p>
</div>

<div class="card">
<h3>Future Project</h3>
<p>Coming soon</p>
</div>

<div class="card">
<h3>Future Project</h3>
<p>Coming soon</p>
</div>

</div>

</section>

<section id="roadmap">

<h2 class="title">Roadmap</h2>

<p>

Future development phases.

</p>

</section>

<footer>

© 2026 Your Brand

</footer>

<script>

/* SCROLL PROGRESS BAR */

window.addEventListener("scroll",()=>{

let scroll=window.scrollY

let height=document.body.scrollHeight-window.innerHeight

let progress=(scroll/height)*100

document.getElementById("progress").style.width=progress+"%"

})

/* SCROLL REVEAL */

let sections=document.querySelectorAll("section")

window.addEventListener("scroll",()=>{

sections.forEach(sec=>{

let top=sec.getBoundingClientRect().top

if(top<window.innerHeight-100){

sec.classList.add("show")

}

})

})

/* LOGO PARALLAX */

let logo=document.getElementById("logo")

window.addEventListener("scroll",()=>{

let scroll=window.scrollY

logo.style.transform="scale("+(1-scroll*0.0005)+")"

})

</script>

</body>

</html>
